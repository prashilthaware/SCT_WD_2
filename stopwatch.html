<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #3b3b3b;
      margin: 0;
    }
    .container {
      background: #b1b1b1;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 {
      margin-bottom: 20px;
    }
    .time {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .start { background: #261a1a; color: white; }
    .pause { background: #261a1a; color: white; }
    .reset { background: #261a1a; color: white; }
    .lap { background: #261a1a; color: white; }
    ul {
      margin-top: 20px;
      padding: 0;
      list-style: none;
      max-height: 150px;
      overflow-y: auto;
    }
    li {
      background: #f1f1f1;
      margin: 5px 0;
      padding: 8px;
      border-radius: 5px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stopwatch</h1>
    <div class="time" id="display">00:00:00</div>
    <div>
      <button class="start" onclick="start()">Start</button>
      <button class="pause" onclick="pause()">Pause</button>
      <button class="reset" onclick="reset()">Reset</button>
      <button class="lap" onclick="lap()">Lap</button>
    </div>
    <ul id="laps"></ul>
  </div>  <script>
    let timer = null;
    let startTime = 0;
    let elapsedTime = 0;
    let running = false;

    function formatTime(ms) {
      let totalSeconds = Math.floor(ms / 1000);
      let hours = Math.floor(totalSeconds / 3600);
      let minutes = Math.floor((totalSeconds % 3600) / 60);
      let seconds = totalSeconds % 60;

      return (
        String(hours).padStart(2, '0') + ':' +
        String(minutes).padStart(2, '0') + ':' +
        String(seconds).padStart(2, '0')
      );
    }

    function updateDisplay() {
      document.getElementById('display').innerText = formatTime(elapsedTime);
    }

    function start() {
      if (!running) {
        running = true;
        startTime = Date.now() - elapsedTime;
        timer = setInterval(() => {
          elapsedTime = Date.now() - startTime;
          updateDisplay();
        }, 1000);
      }
    }

    function pause() {
      running = false;
      clearInterval(timer);
    }

    function reset() {
      running = false;
      clearInterval(timer);
      elapsedTime = 0;
      updateDisplay();
      document.getElementById('laps').innerHTML = '';
    }

    function lap() {
      if (running) {
        let lapTime = formatTime(elapsedTime);
        let li = document.createElement('li');
        li.innerText = 'Lap: ' + lapTime;
        document.getElementById('laps').appendChild(li);
      }
    }
  </script></body>
</html>
